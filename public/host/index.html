<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Party Games – Host</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap');

  :root {
    --bg: #0f0e17;
    --panel: #1a1830;
    --accent: #ff6b35;
    --yellow: #ffd166;
    --green: #06d6a0;
    --blue: #118ab2;
    --pink: #ef476f;
    --text: #fffffe;
    --muted: #a8a4c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--panel);
    border-bottom: 3px solid var(--accent);
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 1px;
  }

  #join-info {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 0.95rem;
  }

  #join-info .url {
    font-family: monospace;
    font-size: 1.1rem;
    color: var(--yellow);
    background: rgba(255,209,102,0.1);
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--yellow);
  }

  #qr-img { width: 80px; height: 80px; border-radius: 8px; background: white; padding: 4px; }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    gap: 0;
  }

  /* ── Sidebar: Players ── */
  #sidebar {
    width: 220px;
    background: var(--panel);
    border-right: 2px solid #2a2845;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #sidebar h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #player-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  #player-list li {
    background: rgba(255,107,53,0.12);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 10px;
    padding: 8px 12px;
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #player-list li::before {
    content: '●';
    color: var(--green);
    font-size: 0.7rem;
  }

  /* ── Game Area ── */
  #game-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  /* ── Lobby ── */
  #lobby {
    text-align: center;
    max-width: 800px;
    width: 100%;
  }

  #lobby h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    margin-bottom: 8px;
    color: var(--yellow);
  }

  #lobby p {
    color: var(--muted);
    font-size: 1.1rem;
    margin-bottom: 32px;
  }

  #game-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .game-card {
    background: var(--panel);
    border: 2px solid #2a2845;
    border-radius: 16px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .game-card:hover, .game-card.selected {
    border-color: var(--accent);
    background: rgba(255,107,53,0.1);
    transform: translateY(-3px);
  }

  .game-card .game-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    margin-bottom: 6px;
  }

  .game-card .game-meta {
    font-size: 0.85rem;
    color: var(--muted);
  }

  #btn-start {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    background: var(--accent);
    color: white;
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(255,107,53,0.4);
  }

  #btn-start:hover { transform: scale(1.05); }
  #btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #btn-quit {
    margin-top: auto;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    background: rgba(255,107,53,0.12);
    color: var(--muted);
    border: 1px solid rgba(255,107,53,0.3);
    padding: 12px 18px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #btn-quit:hover {
    background: rgba(255,107,53,0.25);
  }

  #error-msg {
    color: var(--pink);
    margin-top: 12px;
    font-weight: 700;
    min-height: 24px;
  }

  /* ── In-Game Views ── */
  .game-view {
    width: 100%;
    text-align: center;
  }

  .big-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    color: var(--yellow);
    margin-bottom: 12px;
  }

  /* Trivia */
  #trivia-view .question-text {
    font-size: 2rem;
    font-weight: 800;
    margin: 24px 0 32px;
    line-height: 1.3;
  }

  #trivia-view .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  .choice-btn {
    padding: 20px;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid transparent;
    cursor: default;
    transition: all 0.3s;
  }

  .choice-btn.A { background: rgba(239,71,111,0.2); border-color: var(--pink); }
  .choice-btn.B { background: rgba(17,138,178,0.2); border-color: var(--blue); }
  .choice-btn.C { background: rgba(255,209,102,0.2); border-color: var(--yellow); }
  .choice-btn.D { background: rgba(6,214,160,0.2); border-color: var(--green); }

  .choice-btn.correct { transform: scale(1.05); box-shadow: 0 0 30px rgba(6,214,160,0.6); }
  .choice-btn.wrong   { opacity: 0.35; }

  #trivia-view .timer-bar {
    height: 8px;
    background: #2a2845;
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  #trivia-timer-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 1s linear;
  }

  /* Scoreboard */
  #scoreboard {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 1.2rem;
    font-weight: 700;
    animation: slideIn 0.4s ease both;
  }

  .score-row:nth-child(1) { border-left: 4px solid var(--yellow); }
  .score-row:nth-child(2) { border-left: 4px solid var(--muted); }
  .score-row:nth-child(3) { border-left: 4px solid #cd7f32; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Draw & Guess */
  #draw-canvas-wrap {
    position: relative;
    display: inline-block;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--accent);
    background: white;
  }

  #draw-canvas { display: block; }

  #draw-label {
    font-size: 1.1rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* hidden helper */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>🎮 Party Games</h1>
  <div id="join-info">
    <div>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:2px">Players join at:</div>
      <div class="url" id="player-url">loading…</div>
    </div>
    <img id="qr-img" alt="QR Code">
  </div>
</header>

<main>
  <aside id="sidebar">
    <h2>👥 Players (<span id="player-count">0</span>)</h2>
    <ul id="player-list"></ul>
    <button id="btn-quit" type="button">Quit Game</button>
  </aside>

  <section id="game-area">

    <!-- LOBBY -->
    <div id="lobby">
      <h2>Choose a Game</h2>
      <p>Select a game below, then press Start when everyone has joined!</p>
      <div id="game-list"><!-- populated by JS --></div>
      <button id="btn-start" disabled>Start Game</button>
      <div id="error-msg"></div>
    </div>

    <!-- TRIVIA -->
    <div id="trivia-view" class="game-view hidden">
      <div class="big-title" id="trivia-header">Question 1 / 6</div>
      <div class="timer-bar"><div id="trivia-timer-fill" style="width:100%"></div></div>
      <div class="question-text" id="trivia-question"></div>
      <div class="choices" id="trivia-choices"></div>
    </div>

    <!-- TRIVIA SCOREBOARD -->
    <div id="trivia-score-view" class="game-view hidden">
      <div class="big-title">🏆 Scores</div>
      <div id="scoreboard"></div>
    </div>

    <!-- DRAW & GUESS -->
    <div id="drawguess-view" class="game-view hidden">
      <div class="big-title" id="draw-header">🎨 Draw & Guess</div>
      <div id="draw-label" style="margin-bottom:12px"></div>
      <div id="draw-canvas-wrap">
        <canvas id="draw-canvas" width="640" height="400"></canvas>
      </div>
    </div>

    <!-- DRAW SCOREBOARD -->
    <div id="draw-score-view" class="game-view hidden">
      <div class="big-title">🏆 Final Scores</div>
      <div id="draw-scoreboard"></div>
    </div>

  </section>
</main>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
socket.emit("host:connect");

// ── QR + URL ──────────────────────────────────────────────────────────────
(async () => {
  const ipRes = await fetch("/api/ip");
  const { ip } = await ipRes.json();
  const playerUrl = `http://${ip}:${location.port}/player`;
  document.getElementById("player-url").textContent = playerUrl;
  document.getElementById("qr-img").src = `/qr?url=${encodeURIComponent(playerUrl)}`;
})();

// ── Helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function showView(id) {
  ["lobby","trivia-view","trivia-score-view","drawguess-view","draw-score-view"]
    .forEach(v => $(v).classList.add("hidden"));
  if (id) $(id).classList.remove("hidden");
}

function renderScoreboard(containerId, scores) {
  const el = $(containerId);
  el.innerHTML = scores.map((s, i) => `
    <div class="score-row" style="animation-delay:${i*0.1}s">
      <span>${i===0?"🥇":i===1?"🥈":i===2?"🥉":"  #"+(i+1)} ${s.name}</span>
      <span>${s.score} pts</span>
    </div>`).join("");
}

// ── Lobby ─────────────────────────────────────────────────────────────────
let selectedGame = null;
let gameRunning = false;

socket.on("host:init", ({ players, games }) => {
  renderGames(games);
  renderPlayers(players);
});

socket.on("lobby:update", ({ players, games }) => {
  renderPlayers(players);
  if (games) renderGames(games);
});

socket.on("host:error", msg => {
  $("error-msg").textContent = msg;
  setTimeout(() => $("error-msg").textContent = "", 4000);
});

function renderGames(games) {
  const list = $("game-list");
  list.innerHTML = games.map(g => `
    <div class="game-card" data-id="${g.id}" onclick="selectGame('${g.id}')">
      <div class="game-name">${g.name}</div>
      <div class="game-meta">${g.minPlayers}–${g.maxPlayers} players</div>
    </div>`).join("");
}

function selectGame(id) {
  selectedGame = id;
  document.querySelectorAll(".game-card").forEach(c =>
    c.classList.toggle("selected", c.dataset.id === id));
  $("btn-start").disabled = false;
}

function renderPlayers(players) {
  $("player-count").textContent = players.length;
  $("player-list").innerHTML = players.map(p =>
    `<li>${p.name}</li>`).join("");
}

$("btn-start").onclick = () => {
  if (!selectedGame) return;
  socket.emit("host:start_game", { gameId: selectedGame });
};

$("btn-quit").onclick = () => {
  if (!gameRunning) return;
  socket.emit("host:end_game");
};

// ── Game start/end ─────────────────────────────────────────────────────────
socket.on("game:start", ({ gameId }) => {
  gameRunning = true;
});

socket.on("game:end", () => {
  gameRunning = false;
  showView("lobby");
});

// ── TRIVIA ─────────────────────────────────────────────────────────────────
const COLORS = ["A","B","C","D"];
let triviaTimer = null;

socket.on("trivia:question", ({ index, total, question, choices }) => {
  showView("trivia-view");
  $("trivia-header").textContent = `Question ${index+1} / ${total}`;
  $("trivia-question").textContent = question;
  $("trivia-choices").innerHTML = choices.map((c, i) =>
    `<div class="choice-btn ${COLORS[i]}">${COLORS[i]}. ${c}</div>`).join("");

  // Timer bar animation
  const fill = $("trivia-timer-fill");
  fill.style.transition = "none";
  fill.style.width = "100%";
  requestAnimationFrame(() => {
    fill.style.transition = "width 15s linear";
    fill.style.width = "0%";
  });
});

socket.on("trivia:reveal", ({ correctIndex, scores }) => {
  const btns = document.querySelectorAll(".choice-btn");
  btns.forEach((b, i) => {
    b.classList.add(i === correctIndex ? "correct" : "wrong");
  });
  setTimeout(() => {
    showView("trivia-score-view");
    renderScoreboard("scoreboard", scores);
  }, 2000);
});

socket.on("trivia:gameover", ({ scores }) => {
  showView("trivia-score-view");
  renderScoreboard("scoreboard", scores);
  $("trivia-score-view").querySelector(".big-title").textContent = "🏆 Final Scores!";
});

// ── DRAW & GUESS ────────────────────────────────────────────────────────────
const canvas = $("draw-canvas");
const ctx = canvas.getContext("2d");

function clearCanvas() {
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}
clearCanvas();

socket.on("drawguess:round_start", ({ drawerName, round, total }) => {
  showView("drawguess-view");
  clearCanvas();
  $("draw-header").textContent = `Round ${round}/${total} – ${drawerName} is drawing…`;
  $("draw-label").textContent = "";
});

socket.on("drawguess:stroke", ({ stroke }) => {
  if (!stroke || stroke.length < 2) return;
  ctx.beginPath();
  ctx.strokeStyle = stroke[0].color || "#222";
  ctx.lineWidth   = stroke[0].size  || 4;
  ctx.lineCap     = "round";
  ctx.lineJoin    = "round";
  ctx.moveTo(stroke[0].x * canvas.width, stroke[0].y * canvas.height);
  for (let i = 1; i < stroke.length; i++) {
    ctx.lineTo(stroke[i].x * canvas.width, stroke[i].y * canvas.height);
  }
  ctx.stroke();
});

socket.on("drawguess:clear", clearCanvas);

socket.on("drawguess:reveal", ({ word, correct, guesses, scores }) => {
  $("draw-label").innerHTML =
    `The word was: <strong style="color:var(--yellow);font-size:1.3rem">${word}</strong>` +
    (correct.length ? ` — ✅ ${correct.join(", ")} got it!` : " — Nobody guessed it!");
  setTimeout(() => {
    renderScoreboard("draw-scoreboard", scores);
    showView("draw-score-view");
  }, 3000);
});

socket.on("drawguess:gameover", ({ scores }) => {
  renderScoreboard("draw-scoreboard", scores);
  showView("draw-score-view");
  $("draw-score-view").querySelector(".big-title").textContent = "🏆 Final Scores!";
});
</script>
</body>
</html>
