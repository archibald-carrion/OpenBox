<style>
  #trivia-question-view, #trivia-score-view { width: 100%; text-align: center; }

  .trivia-header {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: var(--yellow);
    margin-bottom: 10px;
  }

  .timer-bar {
    height: 8px;
    background: #2a2845;
    border-radius: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  #trivia-timer-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 15s linear;
  }

  .trivia-question-text {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 32px;
    line-height: 1.3;
  }

  .trivia-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  .trivia-choice {
    padding: 20px;
    border-radius: 14px;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid transparent;
    transition: all 0.3s;
  }

  .trivia-choice.A { background: rgba(239,71,111,0.2);  border-color: var(--pink); }
  .trivia-choice.B { background: rgba(17,138,178,0.2);  border-color: #118ab2; }
  .trivia-choice.C { background: rgba(255,209,102,0.2); border-color: var(--yellow); }
  .trivia-choice.D { background: rgba(6,214,160,0.2);   border-color: var(--green); }

  .trivia-choice.correct { transform: scale(1.05); box-shadow: 0 0 30px rgba(6,214,160,0.6); }
  .trivia-choice.wrong   { opacity: 0.3; }

  /* Scoreboard */
  .score-list { display: flex; flex-direction: column; gap: 10px; max-width: 500px; margin: 16px auto 0; }

  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 1.2rem;
    font-weight: 700;
    animation: slideIn 0.4s ease both;
  }

  .score-row:nth-child(1) { border-left: 4px solid var(--yellow); }
  .score-row:nth-child(2) { border-left: 4px solid var(--muted); }
  .score-row:nth-child(3) { border-left: 4px solid #cd7f32; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style>

<!-- Question view -->
<div id="trivia-question-view">
  <div class="trivia-header" id="trivia-header">Question 1 / 6</div>
  <div class="timer-bar"><div id="trivia-timer-fill" style="width:100%"></div></div>
  <div class="trivia-question-text" id="trivia-question"></div>
  <div class="trivia-choices" id="trivia-choices"></div>
</div>

<!-- Score view (hidden until reveal) -->
<div id="trivia-score-view" style="display:none">
  <div class="trivia-header" id="trivia-score-title">🏆 Scores</div>
  <div class="score-list" id="trivia-scoreboard"></div>
</div>
