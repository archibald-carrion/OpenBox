<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenBox – Host</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap');

  :root {
    --bg:     #0f0e17;
    --panel:  #1a1830;
    --accent: #ff6b35;
    --yellow: #ffd166;
    --green:  #06d6a0;
    --pink:   #ef476f;
    --text:   #fffffe;
    --muted:  #a8a4c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--panel);
    border-bottom: 3px solid var(--accent);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--accent);
  }

  #join-info { display: flex; align-items: center; gap: 20px; }

  #join-info .url {
    font-family: monospace;
    font-size: 1.1rem;
    color: var(--yellow);
    background: rgba(255,209,102,0.1);
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--yellow);
  }

  #qr-img {
    width: 80px; height: 80px;
    border-radius: 8px;
    background: white;
    padding: 4px;
  }

  /* ── Layout ── */
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    background: var(--panel);
    border-right: 2px solid #2a2845;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-shrink: 0;
  }

  #sidebar h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #player-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  #player-list li {
    background: rgba(255,107,53,0.12);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 10px;
    padding: 8px 12px;
    font-weight: 700;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #player-list li::before { content: '●'; color: var(--green); font-size: 0.65rem; }

  #player-list li.disconnected::before { color: var(--pink); }

  /* ── Game area ── */
  #game-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow: auto;
  }

  /* ── Lobby ── */
  #lobby {
    text-align: center;
    max-width: 860px;
    width: 100%;
  }

  #lobby h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: var(--yellow);
    margin-bottom: 8px;
  }

  #lobby p { color: var(--muted); font-size: 1.1rem; margin-bottom: 32px; }

  #game-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .game-card {
    background: var(--panel);
    border: 2px solid #2a2845;
    border-radius: 16px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .game-card:hover, .game-card.selected {
    border-color: var(--accent);
    background: rgba(255,107,53,0.1);
    transform: translateY(-3px);
  }

  .game-card .game-name { font-family: 'Fredoka One', cursive; font-size: 1.4rem; margin-bottom: 6px; }
  .game-card .game-meta { font-size: 0.85rem; color: var(--muted); }

  #btn-start {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    background: var(--accent);
    color: white;
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(255,107,53,0.4);
  }

  #btn-start:hover    { transform: scale(1.05); }
  #btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #error-msg { color: var(--pink); margin-top: 12px; font-weight: 700; min-height: 24px; }

  /* ── Game container (injected game HTML lives here) ── */
  #game-container { width: 100%; height: 100%; display: none; }

  /* ── Fixed buttons ── */
  #btn-end {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    background: #2a2845;
    color: var(--muted);
    border: 1px solid #3a3860;
    padding: 10px 24px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
    z-index: 100;
  }

  #btn-end:hover { background: var(--pink); color: white; border-color: var(--pink); }

  /* Game-injected action button */
  .btn-game-action {
    position: fixed;
    bottom: 24px;
    right: 160px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    background: #2a2845;
    color: var(--muted);
    border: 1px solid #3a3860;
    padding: 10px 24px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 100;
  }

  .btn-game-action:hover { background: var(--yellow); color: #111; border-color: var(--yellow); }
</style>
</head>
<body>

<header>
  <h1>🎮 OpenBox</h1>
  <div id="join-info">
    <div>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:2px">Players join at:</div>
      <div class="url" id="player-url">loading…</div>
    </div>
    <img id="qr-img" alt="QR">
  </div>
</header>

<main>
  <aside id="sidebar">
    <h2>👥 Players (<span id="player-count">0</span>)</h2>
    <ul id="player-list"></ul>
  </aside>

  <section id="game-area">
    <!-- LOBBY -->
    <div id="lobby">
      <h2>Choose a Game</h2>
      <p>Select a game, then press Start when everyone has joined!</p>
      <div id="game-list"></div>
      <button id="btn-start" disabled>Start Game</button>
      <div id="error-msg"></div>
    </div>

    <!-- Active game UI is injected here -->
    <div id="game-container" style="display:none;width:100%;height:100%"></div>
  </section>
</main>

<!-- Always-visible end game button (shown during any game) -->
<button id="btn-end">🚪 End Game</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
socket.emit("host:connect");

// ── Helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function showLobby() {
  $("lobby").style.display         = "";
  $("game-container").style.display = "none";
  $("btn-end").style.display        = "none";
  removeGameAction();
}

function showGame() {
  $("lobby").style.display          = "none";
  $("game-container").style.display = "block";
  $("btn-end").style.display        = "block";
}

// ── QR / URL (fetched from server so it's the real LAN IP) ───────────────
(async () => {
  const { ip } = await fetch("/api/ip").then(r => r.json());
  const playerUrl = `http://${ip}:${location.port}/player`;
  $("player-url").textContent = playerUrl;
  $("qr-img").src = `/qr?url=${encodeURIComponent(playerUrl)}`;
})();

// ── Lobby ─────────────────────────────────────────────────────────────────
let selectedGame = null;

socket.on("host:init",    ({ players, games }) => { renderPlayers(players); renderGames(games); });
socket.on("lobby:update", ({ players, games }) => { renderPlayers(players); if (games) renderGames(games); });
socket.on("host:error",   msg => {
  $("error-msg").textContent = msg;
  setTimeout(() => $("error-msg").textContent = "", 4000);
});

function renderPlayers(players) {
  $("player-count").textContent = players.length;
  $("player-list").innerHTML = players.map(p =>
    `<li class="${p.connected ? '' : 'disconnected'}">${p.name}</li>`
  ).join("");
}

function renderGames(games) {
  $("game-list").innerHTML = games.map(g => `
    <div class="game-card" data-id="${g.id}" onclick="selectGame('${g.id}')">
      <div class="game-name">${g.name}</div>
      <div class="game-meta">${g.minPlayers}–${g.maxPlayers} players</div>
    </div>`).join("");
}

function selectGame(id) {
  selectedGame = id;
  document.querySelectorAll(".game-card").forEach(c =>
    c.classList.toggle("selected", c.dataset.id === id));
  $("btn-start").disabled = false;
}

$("btn-start").onclick = () => {
  if (selectedGame) socket.emit("host:start_game", { gameId: selectedGame });
};

$("btn-end").onclick = () => socket.emit("host:end_game");

// ── Game lifecycle ────────────────────────────────────────────────────────
const loadedScripts = [];

socket.on("game:start", async ({ gameId }) => {
  // Load game's host HTML fragment
  const html = await fetch(`/games/${gameId}/host.html`).then(r => r.text());
  $("game-container").innerHTML = html;

  // Load game's host JS — all socket listeners are registered by the time this resolves
  await loadScript(`/games/${gameId}/host.js`);

  showGame();

  // Pull current game state from server now that our listeners are registered
  socket.emit("host:ready");
});

socket.on("game:end", () => {
  // Unload game scripts
  loadedScripts.forEach(s => s.remove());
  loadedScripts.length = 0;
  $("game-container").innerHTML = "";
  showLobby();
});

function loadScript(src) {
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload  = resolve;
    s.onerror = resolve; // don't block if optional
    document.body.appendChild(s);
    loadedScripts.push(s);
  });
}

// ── Game-controlled action button ─────────────────────────────────────────
// Games can ask for a contextual button via socket events
socket.on("host:show_action", ({ label, type }) => {
  removeGameAction();
  const btn = document.createElement("button");
  btn.className   = "btn-game-action";
  btn.id          = "btn-game-action";
  btn.textContent = label;
  btn.onclick     = () => socket.emit("host:action", { type });
  document.body.appendChild(btn);
});

socket.on("host:hide_action", removeGameAction);

function removeGameAction() {
  document.getElementById("btn-game-action")?.remove();
}
</script>
</body>
</html>
