<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenBox – Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap');

  :root {
    --bg:     #0f0e17;
    --panel:  #1a1830;
    --accent: #ff6b35;
    --yellow: #ffd166;
    --green:  #06d6a0;
    --pink:   #ef476f;
    --text:   #fffffe;
    --muted:  #a8a4c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ── Shared input / button styles (available to game fragments too) ── */
  .ob-input {
    width: 100%;
    max-width: 320px;
    padding: 14px 18px;
    border-radius: 14px;
    border: 2px solid #2a2845;
    background: var(--panel);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    outline: none;
    text-align: center;
    display: block;
    margin-bottom: 16px;
  }

  .ob-input:focus { border-color: var(--accent); }

  .ob-btn {
    display: block;
    width: 100%;
    max-width: 320px;
    padding: 16px;
    border-radius: 50px;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .ob-btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 20px rgba(255,107,53,0.35);
  }

  .ob-btn-primary:active { transform: scale(0.97); }

  /* ── Views ── */
  .view { width: 100%; max-width: 400px; text-align: center; }
  .hidden { display: none !important; }

  h1 {
    font-family: 'Fredoka One', cursive;
    color: var(--accent);
    font-size: 2rem;
    margin-bottom: 8px;
  }

  .subtitle { color: var(--muted); margin-bottom: 28px; font-size: 1rem; }

  /* ── Waiting screen ── */
  #waiting-view .name-badge {
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: var(--yellow);
    margin: 16px 0;
  }

  .pulse {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(255,107,53,0.2);
    border: 3px solid var(--accent);
    margin: 0 auto 16px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.2); opacity: 0.6; }
  }

  /* ── Game container ── */
  #game-container { width: 100%; max-width: 420px; }
</style>
</head>
<body>

<!-- JOIN -->
<div id="join-view" class="view">
  <h1>🎮 OpenBox</h1>
  <p class="subtitle">Enter your name to join</p>
  <input type="text" id="name-input" class="ob-input" placeholder="Your name" maxlength="20" autocomplete="off">
  <button class="ob-btn ob-btn-primary" id="btn-join">Join Game</button>
</div>

<!-- WAITING FOR GAME TO START -->
<div id="waiting-view" class="view hidden">
  <div class="pulse"></div>
  <p style="color:var(--muted)">You're in!</p>
  <div class="name-badge" id="display-name"></div>
  <p style="color:var(--muted);font-size:0.9rem">Waiting for the host to start…</p>
</div>

<!-- Active game UI is injected here -->
<div id="game-container" class="hidden"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({
  reconnection: true,
  reconnectionAttempts: 10,
  reconnectionDelay: 1000,
  timeout: 20000
});

// ── Persistent player ID storage ───────────────────────────────────────────
function getStoredPlayerId() {
  return localStorage.getItem('openbox-player-id');
}

function setStoredPlayerId(id) {
  localStorage.setItem('openbox-player-id', id);
}

function getStoredPlayerName() {
  return localStorage.getItem('openbox-player-name');
}

function setStoredPlayerName(name) {
  localStorage.setItem('openbox-player-name', name);
}

// ── Helpers ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function showView(id) {
  ["join-view", "waiting-view", "game-container"].forEach(v =>
    $(v).classList.toggle("hidden", v !== id));
}

// ── Auto-rejoin if we have stored credentials ──────────────────────────────
function attemptRejoin() {
  const storedId = getStoredPlayerId();
  const storedName = getStoredPlayerName();

  if (storedId && storedName) {
    console.log('Attempting to rejoin with stored credentials');
    socket.emit("player:join", {
      name: storedName,
      persistentId: storedId
    });
    return true;
  }
  return false;
}

// ── Join ──────────────────────────────────────────────────────────────────
$("btn-join").onclick = () => {
  const name = $("name-input").value.trim();
  if (name) {
    setStoredPlayerName(name);
    socket.emit("player:join", { name });
  }
};

$("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") $("btn-join").click();
});

// ── Connection events ─────────────────────────────────────────────────────
socket.on("connect", () => {
  console.log('Connected to server');
  // Try to rejoin if we have stored data
  if (!attemptRejoin()) {
    showView("join-view");
  }
});

socket.on("disconnect", (reason) => {
  console.log('Disconnected:', reason);
  // Don't show join view immediately - we might reconnect
});

socket.on("reconnect", () => {
  console.log('Reconnected to server');
  // Attempt rejoin on reconnection
  attemptRejoin();
});

socket.on("player:joined", ({ name, persistentId, gameActive, gameId }) => {
  setStoredPlayerId(persistentId);
  setStoredPlayerName(name);
  $("display-name").textContent = name;

  if (gameActive) {
    // Game is already active, wait for game:start event
    console.log('Rejoined during active game, waiting for game:start');
  } else {
    showView("waiting-view");
  }
});

// ── Game lifecycle ────────────────────────────────────────────────────────
const loadedScripts = [];

socket.on("game:start", async ({ gameId }) => {
  const html = await fetch(`/games/${gameId}/player.html`).then(r => r.text());
  $("game-container").innerHTML = html;
  await loadScript(`/games/${gameId}/player.js`);
  showView("game-container");

  // Tell server this player's UI is ready
  socket.emit("player:ready");
});

socket.on("game:end", () => {
  loadedScripts.forEach(s => s.remove());
  loadedScripts.length = 0;
  $("game-container").innerHTML = "";
  showView("waiting-view");
});

function loadScript(src) {
  return new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload  = resolve;
    s.onerror = resolve;
    document.body.appendChild(s);
    loadedScripts.push(s);
  });
}
</script>
</body>
</html>
